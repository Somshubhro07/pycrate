name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint with Ruff
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff>=0.8.0

      - name: Run Ruff
        run: ruff check . --output-format=github
        working-directory: pycrate

  # -----------------------------------------------------------------------
  # Job 2: Unit tests (cluster logic — runs on all platforms)
  # -----------------------------------------------------------------------
  test-cluster:
    name: Test Cluster (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install typer[all] rich pyyaml
        working-directory: pycrate

      - name: Run cluster tests
        run: python -m pytest tests/test_cluster.py -v --tb=short
        working-directory: pycrate

  # -----------------------------------------------------------------------
  # Job 3: Integration tests (engine — Linux only, needs root)
  # -----------------------------------------------------------------------
  test-engine:
    name: Test Engine (Linux)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap iproute2 iptables

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: pycrate

      - name: Run engine tests
        run: sudo python -m pytest tests/ -v --tb=short -k "not test_cluster"
        working-directory: pycrate

  # -----------------------------------------------------------------------
  # Job 4: Build and verify package
  # -----------------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-cluster]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build
        working-directory: pycrate

      - name: Verify package
        run: twine check dist/*
        working-directory: pycrate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: pycrate/dist/
