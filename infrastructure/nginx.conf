# Nginx reverse proxy configuration for PyCrate (optional)
#
# Use this if you want to put nginx in front of uvicorn for:
#   - TLS termination (HTTPS)
#   - WebSocket proxying with proper upgrade headers
#   - Request buffering and rate limiting
#
# Install:
#   sudo apt install nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/pycrate
#   sudo ln -s /etc/nginx/sites-available/pycrate /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream pycrate_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # Max request body size (for container creation payloads)
    client_max_body_size 1M;

    # REST API endpoints
    location /api/ {
        proxy_pass http://pycrate_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running container operations
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebSocket endpoints
    location /ws/ {
        proxy_pass http://pycrate_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket connections are long-lived
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Swagger and docs
    location /docs {
        proxy_pass http://pycrate_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://pycrate_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://pycrate_backend;
        proxy_set_header Host $host;
    }

    # Root
    location / {
        proxy_pass http://pycrate_backend;
        proxy_set_header Host $host;
    }
}
